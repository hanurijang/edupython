<div class="portfolios-folder" id="portfolios-folder">
  <button type="button" id="portfolios-toggle" class="btn btn-ghost portfolios-toggle" aria-expanded="false" aria-controls="portfolios-panel">
    <span class="folder-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 7.5C3 6.67 3.67 6 4.5 6H9.17L11 8H19.5C20.33 8 21 8.67 21 9.5V18.5C21 19.33 20.33 20 19.5 20H4.5C3.67 20 3 19.33 3 18.5V7.5Z" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M3 9H21" stroke="#d97706" stroke-width="1.5"/>
      </svg>
    </span>
    포트폴리오
    <span id="portfolios-badge" class="portfolios-badge" hidden>0</span>
  </button>
  <div id="portfolios-panel" class="portfolios-panel" hidden>
    <div class="portfolios-panel-header">
      <span class="folder-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7.5C3 6.67 3.67 6 4.5 6H9.17L11 8H19.5C20.33 8 21 8.67 21 9.5V18.5C21 19.33 20.33 20 19.5 20H4.5C3.67 20 3 19.33 3 18.5V7.5Z" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="portfolios-panel-title">포트폴리오</span>
      <button type="button" id="portfolio-add-btn" class="btn btn-sm btn-ghost portfolio-add-btn">+ 추가</button>
    </div>
    <div id="portfolio-create-form" class="portfolio-create-form" hidden>
      <input type="text" id="portfolio-name-input" class="portfolio-name-input" placeholder="포트폴리오 이름" maxlength="30" autocomplete="off">
      <button type="button" id="portfolio-create-confirm" class="btn btn-sm btn-primary">만들기</button>
      <button type="button" id="portfolio-create-cancel" class="btn btn-sm btn-ghost">취소</button>
    </div>
    <div class="portfolios-body">
      <div id="portfolio-list" class="portfolio-list" role="listbox" aria-label="포트폴리오 목록"></div>
      <div id="portfolio-holdings" class="portfolio-holdings"></div>
    </div>
  </div>
</div>
